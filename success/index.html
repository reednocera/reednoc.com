<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Success | Reed Nocera</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Playfair+Display:ital,wght@0,600;1,600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../styles.css">
    <style>
        body {
            background: #0B1118;
        }
        .success-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            text-align: center;
        }
        .success-card {
            background: var(--surface-color);
            border: 1px solid var(--surface-border);
            border-radius: var(--radius-lg);
            padding: 60px 40px;
            max-width: 650px;
            backdrop-filter: blur(10px);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: fadeInUp 0.8s ease forwards;
        }
        .success-icon {
            width: 80px;
            height: 80px;
            background: rgba(92, 122, 150, 0.15);
            color: #A6BFD6;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 30px;
        }
        .success-icon svg {
            width: 40px;
            height: 40px;
        }
        .success-card h1 {
            font-size: clamp(2.5rem, 5vw, 3.5rem);
            margin-bottom: 24px;
            background: linear-gradient(to right, #ffffff, #A6BFD6);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            font-family: var(--font-heading);
            font-weight: 700;
        }
        .success-card p {
            font-size: 1.25rem;
            color: var(--text-secondary);
            margin-bottom: 48px;
            line-height: 1.6;
        }
        .btn-home {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            background: linear-gradient(135deg, var(--accent-start), var(--accent-end));
            color: white;
            font-size: 1.25rem;
            font-weight: 600;
            padding: 16px 40px;
            border-radius: var(--radius-md);
            box-shadow: 0 10px 25px -5px rgba(92, 122, 150, 0.4);
            transition: var(--transition);
            text-decoration: none;
        }
        .btn-home:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 35px -5px rgba(92, 122, 150, 0.6);
        }
        .btn-home::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            transition: left 0.5s ease;
        }
        .btn-home:hover::before {
            left: 100%;
        }
        .btn-home {
            position: relative;
            overflow: hidden;
        }
    </style>
</head>
<body>
    <div class="success-page">
        <div class="success-card">
            <div class="success-icon">
                <!-- Check Icon -->
                <svg viewBox="0 0 20 20" fill="currentColor">
                    <path fill-rule="evenodd" d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z" clip-rule="evenodd" />
                </svg>
            </div>
            <h1>We've received your order!</h1>
            <p>Your pickup info has been recorded. We will cross-reference your ensemble's performance times and follow up soon via text or email as we get closer to Dayton.</p>
            <a href="/" class="btn-home">
                Back to Home
                <svg style="width: 20px; height: 20px;" viewBox="0 0 20 20" fill="currentColor">
                    <path fill-rule="evenodd" d="M12.293 5.293a1 1 0 011.414 0l4 4a1 1 0 010 1.414l-4 4a1 1 0 01-1.414-1.414L14.586 11H3a1 1 0 110-2h11.586l-2.293-2.293a1 1 0 010-1.414z" clip-rule="evenodd" />
                </svg>
            </a>
        </div>
    </div>
</body>
</html>
